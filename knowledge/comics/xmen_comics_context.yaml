title: "X-Men Comics Context"
type: "comics"
summary: "The X-Men comics focus on mutants, prejudice, identity, and teams formed around Charles Xavier's school. Wolverine, Professor X, Magneto, Cyclops, Jean Grey, Storm, Beast, Rogue, and many others are central comic figures."
important_notes:
  - "Mutants are born with the X-gene in most comic continuities."
  - "Wolverine's adamantium skeleton and healing factor are core traits."
  - "MCU mutant concepts are emerging through multiverse and mutation references."
spoiler_level: "none"
